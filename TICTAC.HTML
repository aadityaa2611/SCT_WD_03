<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tic-Tac-Toe Game</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap');

  * {
    box-sizing: border-box;
  }

  body {
    background: #222;
    color: #eee;
    font-family: 'Poppins', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    margin: 0;
    padding: 30px 20px;
  }

  h1 {
    margin-bottom: 10px;
    font-weight: 600;
    font-size: 2.8rem;
    text-align: center;
    user-select: none;
  }

  .mode-select {
    margin-bottom: 20px;
  }

  label {
    margin-right: 15px;
    font-size: 1.2rem;
    cursor: pointer;
  }

  input[type="radio"] {
    margin-right: 5px;
    cursor: pointer;
  }

  #game {
    display: grid;
    grid-template-columns: repeat(3, 100px);
    grid-template-rows: repeat(3, 100px);
    gap: 15px;
    user-select: none;
    margin-bottom: 25px;
  }

  .cell {
    background: #444;
    border-radius: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3.5rem;
    font-weight: 700;
    color: #eee;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    transition: background-color 0.3s ease, transform 0.2s ease;
  }

  .cell:hover:not(.disabled) {
    background: #5a5a5a;
    transform: scale(1.05);
  }

  .cell.disabled {
    cursor: default;
  }

  #status {
    font-size: 1.3rem;
    margin-bottom: 20px;
    min-height: 28px;
    text-align: center;
    font-weight: 600;
    user-select: none;
  }

  button#resetBtn {
    background: #764ba2;
    border: none;
    border-radius: 25px;
    padding: 12px 40px;
    font-size: 1.1rem;
    color: white;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(118,75,162,0.6);
    transition: background-color 0.3s ease;
  }

  button#resetBtn:hover {
    background: #667eea;
    box-shadow: 0 6px 20px rgba(102,126,234,0.7);
  }

  button#resetBtn:active {
    transform: scale(0.95);
  }

  /* Winning line highlight */
  .cell.win {
    background: #ff6f61 !important;
    color: white;
    font-weight: 900;
    box-shadow: 0 0 15px 5px #ff6f61;
  }

  /* Responsive */
  @media (max-width: 400px) {
    #game {
      grid-template-columns: repeat(3, 80px);
      grid-template-rows: repeat(3, 80px);
      gap: 10px;
    }
    .cell {
      font-size: 2.8rem;
    }
  }
</style>
</head>
<body>

<h1>Tic-Tac-Toe</h1>

<div class="mode-select" role="radiogroup" aria-label="Game mode selection">
  <label><input type="radio" name="mode" value="2player" checked> 2 Player</label>
  <label><input type="radio" name="mode" value="computer"> Vs Computer</label>
</div>

<div id="status" aria-live="polite" aria-atomic="true">Player X's turn</div>

<div id="game" role="grid" aria-label="Tic Tac Toe Board">
  <!-- 9 cells will be generated by JS -->
</div>

<button id="resetBtn">Reset Game</button>

<script>
  const gameContainer = document.getElementById('game');
  const statusDiv = document.getElementById('status');
  const resetBtn = document.getElementById('resetBtn');
  const modeRadios = document.querySelectorAll('input[name="mode"]');

  let board = Array(9).fill(null);
  let currentPlayer = 'X';
  let gameActive = true;
  let gameMode = '2player'; // default

  // Winning combinations
  const winningCombinations = [
    [0,1,2], [3,4,5], [6,7,8], // rows
    [0,3,6], [1,4,7], [2,5,8], // cols
    [0,4,8], [2,4,6]           // diagonals
  ];

  // Create cells dynamically
  function createCells() {
    gameContainer.innerHTML = '';
    for (let i = 0; i < 9; i++) {
      const cell = document.createElement('div');
      cell.classList.add('cell');
      cell.setAttribute('role', 'gridcell');
      cell.setAttribute('aria-label', `Cell ${i + 1}`);
      cell.setAttribute('data-index', i);
      cell.addEventListener('click', handleCellClick);
      gameContainer.appendChild(cell);
    }
  }

  // Handle click on a cell
  function handleCellClick(e) {
    const index = parseInt(e.target.getAttribute('data-index'));
    if (!gameActive || board[index] !== null) return;

    makeMove(index, currentPlayer);
    if (checkWin(currentPlayer)) {
      endGame(false);
    } else if (checkDraw()) {
      endGame(true);
    } else {
      togglePlayer();
      if (gameMode === 'computer' && currentPlayer === 'O') {
        computerMove();
      } else {
        updateStatus();
      }
    }
  }

  // Place player's mark on board and update UI
  function makeMove(index, player) {
    board[index] = player;
    const cell = gameContainer.querySelector(`[data-index='${index}']`);
    cell.textContent = player;
    cell.classList.add('disabled');
  }

  // Switch current player
  function togglePlayer() {
    currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
  }

  // Update status text
  function updateStatus() {
    statusDiv.textContent = `Player ${currentPlayer}'s turn`;
  }

  // Check if player has won
  function checkWin(player) {
    for (const combo of winningCombinations) {
      if (combo.every(index => board[index] === player)) {
        highlightWin(combo);
        return true;
      }
    }
    return false;
  }

  // Highlight winning cells
  function highlightWin(combo) {
    combo.forEach(index => {
      const cell = gameContainer.querySelector(`[data-index='${index}']`);
      cell.classList.add('win');
    });
  }

  // Check for draw
  function checkDraw() {
    return board.every(cell => cell !== null);
  }

  // End the game
  function endGame(draw) {
    gameActive = false;
    if (draw) {
      statusDiv.textContent = "It's a draw!";
    } else {
      statusDiv.textContent = `Player ${currentPlayer} wins!`;
    }
    // Disable all cells
    document.querySelectorAll('.cell').forEach(cell => cell.classList.add('disabled'));
  }

  // Computer makes a move (random empty cell)
  function computerMove() {
    statusDiv.textContent = "Computer is thinking...";
    // Delay to simulate thinking
    setTimeout(() => {
      if (!gameActive) return;
      const emptyIndices = board
        .map((val, idx) => val === null ? idx : null)
        .filter(idx => idx !== null);
      if (emptyIndices.length === 0) return;

      // Simple random choice for now
      const move = emptyIndices[Math.floor(Math.random() * emptyIndices.length)];
      makeMove(move, 'O');

      if (checkWin('O')) {
        endGame(false);
      } else if (checkDraw()) {
        endGame(true);
      } else {
        currentPlayer = 'X';
        updateStatus();
      }
    }, 600);
  }

  // Reset the game state
  function resetGame() {
    board.fill(null);
    currentPlayer = 'X';
    gameActive = true;
    statusDiv.textContent = `Player ${currentPlayer}'s turn`;
    createCells();
  }

  // Change mode handler
  modeRadios.forEach(radio => {
    radio.addEventListener('change', e => {
      gameMode = e.target.value;
      resetGame();
    });
  });

  // Initial setup
  createCells();

  resetBtn.addEventListener('click', resetGame);
</script>

</body>
</html>
